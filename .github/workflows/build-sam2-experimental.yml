# .github/workflows/build-sam2-experimental.yml
# Builds the EXPERIMENTAL SAM2 worker image from Dockerfile.sam2 and pushes it
# to GHCR. Completely separate from the production build (docker-publish.yml,
# main branch only) -- the stable image never depends on SAM2.
#
# Produces:
#   ghcr.io/gabe3laka/safelens-deimv2-worker:sam2-experimental
#   ghcr.io/gabe3laka/safelens-deimv2-worker:sam2-<short-sha>

name: Build SAM2 experimental image

on:
  push:
    branches:
      - sam2-experimental
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-sam2:
    name: Build and push (SAM2 experimental)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sam2-experimental
            type=sha,prefix=sam2-,format=short

      # Layers Dockerfile.sam2 on top of the stable :latest production image.
      # A separate cache scope keeps it from clobbering the production cache.
      - name: Build and push SAM2 experimental image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sam2
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sam2-experimental
          cache-to: type=gha,mode=max,scope=sam2-experimental
