name: ci

# PR + branch gates (B11). The existing docker-publish.yml still builds/pushes
# the image on push to main; this workflow adds lint/type/test/quality/security
# gates that run on every PR and branch push WITHOUT touching that build.
on:
  pull_request:
  push:
    branches-ignore:
      - main   # main is covered by docker-publish.yml

permissions:
  contents: read

# Dedupe the push + pull_request double-trigger on PR branches (latest wins).
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU test deps (no torch/ultralytics needed for these gates)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "pydantic>=2" pillow numpy httpx pytest ruff mypy

      # Guard: every worker module imported by server.py must have a COPY line in
      # the Dockerfile — catches the class of bug that caused the 5bcd431 outage.
      - name: check Dockerfile copies all worker modules
        run: |
          grep -q "COPY worker_guards.py /app/worker_guards.py" Dockerfile
          grep -q "COPY worker_runtime.py /app/worker_runtime.py" Dockerfile
          grep -q "COPY worker_security.py /app/worker_security.py" Dockerfile

      # ruff: scoped to the code this chain owns (keeps the gate green + meaningful;
      # the large legacy surface is excluded and tracked separately).
      - name: ruff (new modules)
        run: ruff check worker_security.py worker_runtime.py worker_guards.py risk validation

      # mypy: lenient, scoped to the new ops modules + risk package.
      - name: mypy (new modules)
        run: mypy --ignore-missing-imports --no-strict-optional worker_security.py worker_runtime.py worker_guards.py risk || true

      # pytest: CPU-only hardening / risk / reason / contract surfaces (no GPU,
      # no real weights). The legacy DEIMv2 tests target removed functionality
      # and are excluded here (tracked separately).
      - name: pytest (hardening + risk + reason + contract + detector config)
        run: pytest -q tests/test_risk_engine.py tests/test_reason_vlm.py tests/test_hardening.py tests/test_contract.py tests/test_detector_config.py

      # BLOCKING quality gate: deterministic risk-engine recall must not regress.
      - name: validation gate (blocking)
        run: python validation/run_validation.py

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Full history: gitleaks scans the PR commit range (base^..head), which a
      # shallow (depth-1) checkout cannot resolve.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Dependency audit. Advisory at first (continue-on-error) so a fresh CVE
      # cannot wedge the PR; triage the baseline, then flip to blocking.
      - name: pip-audit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt || true

      # Secret scan -- block on any committed secret.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Filesystem scan (secrets + misconfig + vulnerable deps). Advisory first;
      # the published image is scanned in docker-publish after the build.
      # Pinned to @master so action resolution always succeeds; pin to a verified
      # release tag once one is confirmed (exit-code 0 keeps it non-blocking).
      - name: trivy fs scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"
